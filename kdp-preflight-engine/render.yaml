# Render Blueprint: KDP Preflight Engine (API + worker in one service)
# Deploy: Connect this repo, set root directory to "kdp-preflight-engine", add REDIS_URL in dashboard
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: kdp-preflight-api
    runtime: docker
    dockerfilePath: ./Dockerfile.live
    dockerContext: .
    region: oregon
    plan: free
    preDeployCommand: ""
    envVars:
      - key: REDIS_URL
        sync: false
      - key: LOCAL_UPLOAD_DIR
        value: /app/data/uploads
    disk:
      name: preflight-uploads
      mountPath: /app/data
      sizeGB: 1
    headers:
      - path: /*
        name: Access-Control-Allow-Origin
        value: "*"
      - path: /*
        name: Access-Control-Allow-Methods
        value: "GET, POST, PUT, DELETE, OPTIONS"
      - path: /*
        name: Access-Control-Allow-Headers
        value: "*"
